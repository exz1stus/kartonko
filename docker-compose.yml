services:
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: backend
        env_file:
            - .env
        depends_on:
            garage:
                condition: service_healthy
            postgresql:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
            start_period: 5s
            interval: 5s
            timeout: 3s
            retries: 5
        networks:
            - app-network
        restart: unless-stopped

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                NEXT_PUBLIC_API_ORIGIN: ${NEXT_PUBLIC_API_ORIGIN}
                NEXT_PUBLIC_FRONTEND_URI: ${NEXT_PUBLIC_FRONTEND_URI}
                NEXT_PUBLIC_API_LOCAL: ${NEXT_PUBLIC_API_LOCAL}
                NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
        container_name: frontend
        env_file:
            - .env
        depends_on:
            backend:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
            start_period: 20s
            interval: 30s
            timeout: 5s
            retries: 3
        networks:
            - app-network
        restart: unless-stopped
    tgbot:
        build:
            context: ./tgbot
            dockerfile: Dockerfile
        container_name: tgbot
        env_file:
            - .env
        depends_on:
            backend:
                condition: service_healthy
        networks:
            - public
            - app-network
    postgresql:
        image: postgres:16-alpine
        container_name: postgresql
        environment:
            POSTGRES_USER: ${DB_USER:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
            POSTGRES_DB: ${DB_NAME:-myapp}
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test:
                ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - app-network
        restart: unless-stopped

    garage:
        image: dxflrs/garage:v2.3.0
        container_name: garage
        restart: unless-stopped
        volumes:
            - ./garage.toml:/etc/garage.toml:ro
            - garagedata:/var/lib/garage/meta
            - garagedata:/var/lib/garage/data
        networks:
            - app-network
        healthcheck:
            test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
            start_period: 5s
            interval: 15s
            timeout: 5s
            retries: 5
    nginx:
        image: nginx:latest
        container_name: nginx
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
        networks:
            - public
            - app-network
        depends_on:
            frontend:
                condition: service_healthy
        restart: unless-stopped

volumes:
    pgdata:
    garagedata:

networks:
    public:
        driver: bridge
    app-network:
        driver: bridge

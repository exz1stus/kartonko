services:
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile.dev
        container_name: backend
        depends_on:
            garage:
                condition: service_healthy
            postgresql:
                condition: service_healthy
        env_file:
            - .env
        volumes:
            - ./backend:/app
            - ./data/db:/app/db
            - ./data/thumbs:/app/thumbs
            - ./data/images:/app/images
        command: air -c .air.toml
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 5s
        restart: unless-stopped
        networks:
            - app-network

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile.dev
        container_name: frontend
        env_file:
            - .env
        volumes:
            - ./frontend:/app
        command: npm run dev
        depends_on:
            backend:
                condition: service_healthy
        networks:
            - app-network

    # tgbot:
    #     build:
    #         context: ./tgbot
    #         dockerfile: Dockerfile.dev
    #     container_name: tgbot
    #     env_file:
    #         - .env
    #     volumes:
    #         - ./tgbot:/app
    #     command: air -c ./.air.toml
    #     networks:
    #         - app-network
    #         - public

    postgresql:
        image: postgres:16-alpine
        container_name: postgresql
        environment:
            POSTGRES_USER: ${DB_USER:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
            POSTGRES_DB: ${DB_NAME:-myapp}
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test:
                ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - app-network
        restart: unless-stopped

    garage:
        image: dxflrs/garage:v2.3.0
        container_name: garage
        restart: unless-stopped
        volumes:
            - ./garage.toml:/etc/garage.toml:ro
            - garagedata:/var/lib/garage/meta
            - garagedata:/var/lib/garage/data
        networks:
            - app-network
        healthcheck:
            test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
            start_period: 5s
            interval: 5s
            timeout: 5s
            retries: 5

    nginx:
        image: nginx:latest
        container_name: nginx
        ports:
            - "80:80"
            - "3000:3000"
        volumes:
            - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
        networks:
            - public
            - app-network
        depends_on:
            - backend
            - frontend

volumes:
    pgdata:
    garagedata:

networks:
    public:
        driver: bridge
    app-network:
        driver: bridge

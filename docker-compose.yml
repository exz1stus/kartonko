services:
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: backend
        env_file:
            - .env
        volumes:
            - ./data/db:/app/db
            - ./data/thumbs:/app/thumbs
            - ./data/images:/app/images

        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 5s
        networks:
            - app-network
        restart: unless-stopped

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                NEXT_PUBLIC_API_ORIGIN: ${NEXT_PUBLIC_API_ORIGIN}
                NEXT_PUBLIC_FRONTEND_URI: ${NEXT_PUBLIC_FRONTEND_URI}
                NEXT_PUBLIC_API_LOCAL: ${NEXT_PUBLIC_API_LOCAL}
        container_name: frontend
        env_file:
            - .env
        depends_on:
            backend:
                condition: service_healthy
        networks:
            - app-network
        restart: unless-stopped
    tgbot:
        build:
            context: ./tgbot
            dockerfile: Dockerfile
        container_name: tgbot
        env_file:
            - .env
        depends_on:
            backend:
                condition: service_healthy
        networks:
            - public
            - app-network
    nginx:
        image: nginx:latest
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
        networks:
            - public
            - app-network
networks:
    public:
        driver: bridge
    app-network:
        driver: bridge
        internal: true

events {}

http {
    resolver 127.0.0.11 valid=30s;
    client_max_body_size 5000M;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=1r/s;

    # 1. Main Frontend Proxy (Port 80)
    server {
        listen 80 default_server;
        server_name _;
        set $frontend_upstream frontend;

        location / {
            proxy_pass http://$frontend_upstream:3000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
        }
    }

    # 2. Production Domain Frontend (Port 80)
    server {
        listen 80;
        server_name kartonko.lol;
        set $frontend_upstream "frontend";

        location / {
            proxy_pass http://$frontend_upstream:3000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 3. Backend Proxy (Port 3000)
    server {
        listen 3000;
        server_name _;
        set $backend_upstream backend;

        location / {
            proxy_pass http://$backend_upstream:8080;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_redirect     off;
        }

        location /upload {
            if ($http_user_agent ~* (curl|wget|python|libwww-perl|Go-http-client)) {
                return 403;
            }
            limit_req zone=upload burst=3 nodelay;

            proxy_pass http://$backend_upstream:8080;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }
    }
}